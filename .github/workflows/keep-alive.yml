name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 9 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            "https://htvdxfmutrpbkgrbymii.supabase.co/rest/v1/members?select=id&limit=1"
